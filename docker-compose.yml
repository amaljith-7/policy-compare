services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prominent}
      POSTGRES_USER: ${POSTGRES_USER:-prominent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prominent_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prominent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://prominent:prominent_secret@db:5432/prominent}
      - SECRET_KEY=${SECRET_KEY:-django-docker-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8101}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8100/api}
    ports:
      - "8101:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  media_data:
