services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prominent}
      POSTGRES_USER: ${POSTGRES_USER:-prominent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prominent_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://prominent:prominent_secret@db:5432/prominent}
      - SECRET_KEY=${SECRET_KEY:-django-docker-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "3002:8000"
    depends_on:
      - db
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3002/api}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  media_data:
